resources:
  jobs:

    # ── Job 1: Pipeline semanal ──────────────────────────
    job_health_pressure_weekly:
      name: job_health_pressure_weekly
      description: >
        Pipeline semanal do Radar de Pressão Assistencial.
        Roda toda segunda-feira: ingestão, transforms, scoring e monitoramento.

      # TODO: restaurar job cluster quando SP tiver permissão de criar clusters
      # job_clusters:
      #   - job_cluster_key: weekly_ml_cluster
      #     new_cluster:
      #       spark_version: "16.4.x-cpu-ml-scala2.13"
      #       node_type_id: "i3.xlarge"
      #       num_workers: 1
      #       spark_conf:
      #         spark.databricks.delta.preview.enabled: "true"
      #       custom_tags:
      #         project: "health-pressure-risk"
      #         job: "weekly"

      schedule:
        quartz_cron_expression: "0 0 6 ? * MON"
        timezone_id: "America/Sao_Paulo"
        pause_status: PAUSED   # ativar em produção

      email_notifications:
        on_failure:
          - christian.bellen@indicium.tech

      environment_variables:
        CATALOG: ${var.catalog}
        SCHEMA: ${var.schema}
        TABLE_BRONZE_SRAG: ${var.table_bronze_srag}
        TABLE_BRONZE_HOSPITAIS_LEITOS: ${var.table_bronze_hospitais_leitos}
        TABLE_BRONZE_CNES: ${var.table_bronze_cnes}
        TABLE_SILVER_SRAG: ${var.table_silver_srag}
        TABLE_SILVER_CAPACITY: ${var.table_silver_capacity}
        TABLE_GOLD_FEATURES: ${var.table_gold_features}
        TABLE_GOLD_SCORING: ${var.table_gold_scoring}
        TABLE_GOLD_MONITOR: ${var.table_gold_monitor}
        LANDING_PATH: ${var.landing_path}
        MLFLOW_EXPERIMENT: ${var.mlflow_experiment}
        MODEL_NAME: ${var.model_name}
        RETRAIN_JOB_NAME: ${var.retrain_job_name}
        TRAIN_END: ${var.train_end}
        VAL_END: ${var.val_end}
        TEST_START: ${var.test_start}
        TARGET_PERCENTILE: ${var.target_percentile}
        PRECISION_K_THRESHOLD: ${var.precision_k_threshold}
        MIN_CONSECUTIVE_BELOW: ${var.min_consecutive_below}
        SCORING_MIN_QUALITY: ${var.scoring_min_quality}
        AB_CHALLENGER_PCT: ${var.ab_challenger_pct}
        DRIFT_SEASONAL_FEATURES: ${var.drift_seasonal_features}
        LGBM_PARAMS_JSON: ${var.lgbm_params_json}
        NUM_BOOST_ROUND: ${var.num_boost_round}
        EARLY_STOPPING: ${var.early_stopping}

      tasks:

        - task_key: ingestao_bronze
          description: "Reingestão das fontes live (SRAG + Hospitais e Leitos)"
          spark_python_task:
            python_file: ../src/ingestion/srag_ingest.py
            parameters: ["--live"]
          # TODO: restaurar job cluster quando SP tiver permissão de criar clusters
          # job_cluster_key: weekly_ml_cluster
          existing_cluster_id: "0319-174645-eah19iqa"
          libraries:
            - whl: /Volumes/ds_dev_db/dev_christian_van_bellen/wheels/health_pressure_risk-0.1.0-py3-none-any.whl
          timeout_seconds: 3600
          max_retries: 1

        - task_key: ingestao_hospitais
          description: "Reingestão de Hospitais e Leitos (live)"
          depends_on:
            - task_key: ingestao_bronze
          spark_python_task:
            python_file: ../src/ingestion/hospitais_leitos_ingest.py
            parameters: ["--live"]
          # TODO: restaurar job cluster quando SP tiver permissão de criar clusters
          # job_cluster_key: weekly_ml_cluster
          existing_cluster_id: "0319-174645-eah19iqa"
          libraries:
            - whl: /Volumes/ds_dev_db/dev_christian_van_bellen/wheels/health_pressure_risk-0.1.0-py3-none-any.whl
          timeout_seconds: 1800
          max_retries: 1

        - task_key: silver_capacity
          description: "Reprocessa silver_capacity_municipio_mes"
          depends_on:
            - task_key: ingestao_hospitais
          spark_python_task:
            python_file: ../src/transforms/silver_capacity_municipio_mes.py
          # TODO: restaurar job cluster quando SP tiver permissão de criar clusters
          # job_cluster_key: weekly_ml_cluster
          existing_cluster_id: "0319-174645-eah19iqa"
          libraries:
            - whl: /Volumes/ds_dev_db/dev_christian_van_bellen/wheels/health_pressure_risk-0.1.0-py3-none-any.whl
          timeout_seconds: 1800

        - task_key: silver_srag
          description: "Reprocessa silver_srag_municipio_semana"
          depends_on:
            - task_key: ingestao_bronze
          spark_python_task:
            python_file: ../src/transforms/silver_srag_municipio_semana.py
          # TODO: restaurar job cluster quando SP tiver permissão de criar clusters
          # job_cluster_key: weekly_ml_cluster
          existing_cluster_id: "0319-174645-eah19iqa"
          libraries:
            - whl: /Volumes/ds_dev_db/dev_christian_van_bellen/wheels/health_pressure_risk-0.1.0-py3-none-any.whl
          timeout_seconds: 1800

        - task_key: gold_features
          description: "Reprocessa gold_pressure_features (Feature Store)"
          depends_on:
            - task_key: silver_capacity
            - task_key: silver_srag
          spark_python_task:
            python_file: ../src/transforms/gold_pressure_features.py
          # TODO: restaurar job cluster quando SP tiver permissão de criar clusters
          # job_cluster_key: weekly_ml_cluster
          existing_cluster_id: "0319-174645-eah19iqa"
          libraries:
            - whl: /Volumes/ds_dev_db/dev_christian_van_bellen/wheels/health_pressure_risk-0.1.0-py3-none-any.whl
          timeout_seconds: 3600

        - task_key: batch_score
          description: "Aplica @champion sobre a competência mais recente elegível"
          depends_on:
            - task_key: gold_features
          spark_python_task:
            python_file: ../src/scoring/batch_score.py
          # TODO: restaurar job cluster quando SP tiver permissão de criar clusters
          # job_cluster_key: weekly_ml_cluster
          existing_cluster_id: "0319-174645-eah19iqa"
          libraries:
            - whl: /Volumes/ds_dev_db/dev_christian_van_bellen/wheels/health_pressure_risk-0.1.0-py3-none-any.whl
          timeout_seconds: 1800

        - task_key: performance_monitor
          description: "Calcula Precision@K realizada e detecta degradação"
          depends_on:
            - task_key: batch_score
          spark_python_task:
            python_file: ../src/monitoring/performance_monitor.py
          # TODO: restaurar job cluster quando SP tiver permissão de criar clusters
          # job_cluster_key: weekly_ml_cluster
          existing_cluster_id: "0319-174645-eah19iqa"
          libraries:
            - whl: /Volumes/ds_dev_db/dev_christian_van_bellen/wheels/health_pressure_risk-0.1.0-py3-none-any.whl
          timeout_seconds: 3600

        - task_key: feature_drift_monitor
          description: "Detecta drift nas distribuições das features vs referência de treino"
          depends_on:
            - task_key: performance_monitor
          spark_python_task:
            python_file: ../src/monitoring/feature_drift_monitor.py
          # TODO: restaurar job cluster quando SP tiver permissão de criar clusters
          # job_cluster_key: weekly_ml_cluster
          existing_cluster_id: "0319-174645-eah19iqa"
          libraries:
            - whl: /Volumes/ds_dev_db/dev_christian_van_bellen/wheels/health_pressure_risk-0.1.0-py3-none-any.whl
          timeout_seconds: 1800

        - task_key: retrain_trigger
          description: >
            Avalia se retraining deve ser disparado.
            Regra: Precision@K < 0.55 por 2+ competências consecutivas.
          depends_on:
            - task_key: feature_drift_monitor
          spark_python_task:
            python_file: ../src/monitoring/retrain_trigger.py
          # TODO: restaurar job cluster quando SP tiver permissão de criar clusters
          # job_cluster_key: weekly_ml_cluster
          existing_cluster_id: "0319-174645-eah19iqa"
          libraries:
            - whl: /Volumes/ds_dev_db/dev_christian_van_bellen/wheels/health_pressure_risk-0.1.0-py3-none-any.whl
          timeout_seconds: 600

    # ── Job 2: Retraining ────────────────────────────────
    job_health_pressure_retrain:
      name: job_health_pressure_retrain
      description: >
        Pipeline de retraining do Radar de Pressão Assistencial.
        Disparado automaticamente pelo retrain_trigger ou manualmente.
        Treina LR + LightGBM, compara com champion atual e registra
        challenger no MLflow para aprovação humana.

      # TODO: restaurar job cluster quando SP tiver permissão de criar clusters
      # job_clusters:
      #   - job_cluster_key: retrain_ml_cluster
      #     new_cluster:
      #       spark_version: "16.4.x-cpu-ml-scala2.13"
      #       node_type_id: "i3.xlarge"
      #       num_workers: 1
      #       spark_conf:
      #         spark.databricks.delta.preview.enabled: "true"
      #       custom_tags:
      #         project: "health-pressure-risk"
      #         job: "retrain"

      # sem schedule — disparado por trigger ou manualmente
      email_notifications:
        on_start:
          - christian.bellen@indicium.tech
        on_success:
          - christian.bellen@indicium.tech
        on_failure:
          - christian.bellen@indicium.tech

      environment_variables:
        CATALOG: ${var.catalog}
        SCHEMA: ${var.schema}
        TABLE_BRONZE_SRAG: ${var.table_bronze_srag}
        TABLE_BRONZE_HOSPITAIS_LEITOS: ${var.table_bronze_hospitais_leitos}
        TABLE_BRONZE_CNES: ${var.table_bronze_cnes}
        TABLE_SILVER_SRAG: ${var.table_silver_srag}
        TABLE_SILVER_CAPACITY: ${var.table_silver_capacity}
        TABLE_GOLD_FEATURES: ${var.table_gold_features}
        TABLE_GOLD_SCORING: ${var.table_gold_scoring}
        TABLE_GOLD_MONITOR: ${var.table_gold_monitor}
        LANDING_PATH: ${var.landing_path}
        MLFLOW_EXPERIMENT: ${var.mlflow_experiment}
        MODEL_NAME: ${var.model_name}
        RETRAIN_JOB_NAME: ${var.retrain_job_name}
        TRAIN_END: ${var.train_end}
        VAL_END: ${var.val_end}
        TEST_START: ${var.test_start}
        TARGET_PERCENTILE: ${var.target_percentile}
        PRECISION_K_THRESHOLD: ${var.precision_k_threshold}
        MIN_CONSECUTIVE_BELOW: ${var.min_consecutive_below}
        SCORING_MIN_QUALITY: ${var.scoring_min_quality}
        AB_CHALLENGER_PCT: ${var.ab_challenger_pct}
        DRIFT_SEASONAL_FEATURES: ${var.drift_seasonal_features}
        LGBM_PARAMS_JSON: ${var.lgbm_params_json}
        NUM_BOOST_ROUND: ${var.num_boost_round}
        EARLY_STOPPING: ${var.early_stopping}

      # parâmetros recebidos do retrain_trigger
      parameters:
        - name: trigger_reason
          default: "manual"
        - name: trigger_date
          default: ""
        - name: retrain_id
          default: ""

      tasks:

        - task_key: train_baseline_lr
          description: "Treina Logistic Regression baseline"
          spark_python_task:
            python_file: ../src/training/train_baseline_lr.py
          # TODO: restaurar job cluster quando SP tiver permissão de criar clusters
          # job_cluster_key: retrain_ml_cluster
          existing_cluster_id: "0319-174645-eah19iqa"
          libraries:
            - whl: /Volumes/ds_dev_db/dev_christian_van_bellen/wheels/health_pressure_risk-0.1.0-py3-none-any.whl
          timeout_seconds: 3600
          max_retries: 1

        - task_key: train_gbt
          description: "Treina LightGBM principal"
          depends_on:
            - task_key: train_baseline_lr
          spark_python_task:
            python_file: ../src/training/train_gbt.py
          # TODO: restaurar job cluster quando SP tiver permissão de criar clusters
          # job_cluster_key: retrain_ml_cluster
          existing_cluster_id: "0319-174645-eah19iqa"
          libraries:
            - whl: /Volumes/ds_dev_db/dev_christian_van_bellen/wheels/health_pressure_risk-0.1.0-py3-none-any.whl
          timeout_seconds: 3600
          max_retries: 1

        - task_key: evaluate
          description: >
            Compara LR vs LightGBM, registra melhor como @challenger
            e aciona human gate no MLflow UI para promoção a @champion.
          depends_on:
            - task_key: train_gbt
          spark_python_task:
            python_file: ../src/training/evaluate.py
          # TODO: restaurar job cluster quando SP tiver permissão de criar clusters
          # job_cluster_key: retrain_ml_cluster
          existing_cluster_id: "0319-174645-eah19iqa"
          libraries:
            - whl: /Volumes/ds_dev_db/dev_christian_van_bellen/wheels/health_pressure_risk-0.1.0-py3-none-any.whl
          timeout_seconds: 3600
