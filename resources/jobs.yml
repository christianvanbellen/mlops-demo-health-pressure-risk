resources:
  jobs:

    # ── Job 1: Pipeline semanal ──────────────────────────
    job_health_pressure_weekly:
      name: job_health_pressure_weekly
      description: >
        Pipeline semanal do Radar de Pressão Assistencial.
        Roda toda segunda-feira: ingestão, transforms, scoring e monitoramento.

      job_clusters:
        - job_cluster_key: weekly_ml_cluster
          new_cluster:
            spark_version: "16.4.x-cpu-ml-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: 1
            policy_id: "00069DFD463E0DBC"
            data_security_mode: SINGLE_USER
            aws_attributes:
              first_on_demand: 1
              availability: SPOT_WITH_FALLBACK
            spark_conf:
              spark.databricks.delta.preview.enabled: "true"
            custom_tags:
              project: "health-pressure-risk"
              job: "weekly"

      schedule:
        quartz_cron_expression: "0 0 6 ? * MON"
        timezone_id: "America/Sao_Paulo"
        pause_status: PAUSED   # ativar em produção

      email_notifications:
        on_failure:
          - christian.bellen@indicium.tech

      tasks:

        - task_key: ingestao_bronze
          description: "Reingestão das fontes live (SRAG + Hospitais e Leitos)"
          spark_python_task:
            python_file: ../src/ingestion/srag_ingest.py
            parameters:
              - "--live"
              - "--catalog"
              - ${var.catalog}
              - "--schema"
              - ${var.schema}
              - "--table_bronze_srag"
              - ${var.table_bronze_srag}
              - "--landing_path"
              - ${var.landing_path}
          job_cluster_key: weekly_ml_cluster
          # existing_cluster_id: "0319-174645-eah19iqa"
          libraries:
            - whl: /Volumes/ds_dev_db/dev_christian_van_bellen/wheels/health_pressure_risk-0.1.0-py3-none-any.whl
            - pypi:
                package: "databricks-labs-dqx>=0.13.0,<0.14.0"
            - pypi:
                package: evidently>=0.7.0
          timeout_seconds: 3600
          max_retries: 1

        - task_key: ingestao_hospitais
          description: "Reingestão de Hospitais e Leitos (live)"
          depends_on:
            - task_key: ingestao_bronze
          spark_python_task:
            python_file: ../src/ingestion/hospitais_leitos_ingest.py
            parameters:
              - "--live"
              - "--catalog"
              - ${var.catalog}
              - "--schema"
              - ${var.schema}
              - "--table_bronze_hospitais_leitos"
              - ${var.table_bronze_hospitais_leitos}
              - "--landing_path"
              - ${var.landing_path}
          job_cluster_key: weekly_ml_cluster
          # existing_cluster_id: "0319-174645-eah19iqa"
          libraries:
            - whl: /Volumes/ds_dev_db/dev_christian_van_bellen/wheels/health_pressure_risk-0.1.0-py3-none-any.whl
            - pypi:
                package: "databricks-labs-dqx>=0.13.0,<0.14.0"
            - pypi:
                package: evidently>=0.7.0
          timeout_seconds: 1800
          max_retries: 1

        - task_key: silver_capacity
          description: "Reprocessa silver_capacity_municipio_mes"
          depends_on:
            - task_key: ingestao_hospitais
          spark_python_task:
            python_file: ../src/transforms/silver_capacity_municipio_mes.py
            parameters:
              - "--catalog"
              - ${var.catalog}
              - "--schema"
              - ${var.schema}
              - "--table_bronze_hospitais_leitos"
              - ${var.table_bronze_hospitais_leitos}
              - "--table_silver_capacity"
              - ${var.table_silver_capacity}
          job_cluster_key: weekly_ml_cluster
          # existing_cluster_id: "0319-174645-eah19iqa"
          libraries:
            - whl: /Volumes/ds_dev_db/dev_christian_van_bellen/wheels/health_pressure_risk-0.1.0-py3-none-any.whl
            - pypi:
                package: "databricks-labs-dqx>=0.13.0,<0.14.0"
            - pypi:
                package: evidently>=0.7.0
          timeout_seconds: 1800

        - task_key: silver_srag
          description: "Reprocessa silver_srag_municipio_semana"
          depends_on:
            - task_key: ingestao_bronze
          spark_python_task:
            python_file: ../src/transforms/silver_srag_municipio_semana.py
            parameters:
              - "--catalog"
              - ${var.catalog}
              - "--schema"
              - ${var.schema}
              - "--table_bronze_srag"
              - ${var.table_bronze_srag}
              - "--table_silver_srag"
              - ${var.table_silver_srag}
          job_cluster_key: weekly_ml_cluster
          # existing_cluster_id: "0319-174645-eah19iqa"
          libraries:
            - whl: /Volumes/ds_dev_db/dev_christian_van_bellen/wheels/health_pressure_risk-0.1.0-py3-none-any.whl
            - pypi:
                package: "databricks-labs-dqx>=0.13.0,<0.14.0"
            - pypi:
                package: evidently>=0.7.0
          timeout_seconds: 1800

        - task_key: gold_features
          description: "Reprocessa gold_pressure_features (Feature Store)"
          depends_on:
            - task_key: silver_capacity
            - task_key: silver_srag
          spark_python_task:
            python_file: ../src/transforms/gold_pressure_features.py
            parameters:
              - "--catalog"
              - ${var.catalog}
              - "--schema"
              - ${var.schema}
              - "--table_silver_srag"
              - ${var.table_silver_srag}
              - "--table_silver_capacity"
              - ${var.table_silver_capacity}
              - "--table_gold_features"
              - ${var.table_gold_features}
              - "--target_percentile"
              - ${var.target_percentile}
          job_cluster_key: weekly_ml_cluster
          # existing_cluster_id: "0319-174645-eah19iqa"
          libraries:
            - whl: /Volumes/ds_dev_db/dev_christian_van_bellen/wheels/health_pressure_risk-0.1.0-py3-none-any.whl
            - pypi:
                package: "databricks-labs-dqx>=0.13.0,<0.14.0"
            - pypi:
                package: evidently>=0.7.0
          timeout_seconds: 3600

        - task_key: batch_score
          description: "Aplica @champion sobre a competência mais recente elegível"
          depends_on:
            - task_key: gold_features
          spark_python_task:
            python_file: ../src/scoring/batch_score.py
            parameters:
              - "--catalog"
              - ${var.catalog}
              - "--schema"
              - ${var.schema}
              - "--table_gold_features"
              - ${var.table_gold_features}
              - "--table_gold_scoring"
              - ${var.table_gold_scoring}
              - "--model_name"
              - ${var.model_name}
              - "--scoring_min_quality"
              - ${var.scoring_min_quality}
              - "--ab_challenger_pct"
              - ${var.ab_challenger_pct}
          job_cluster_key: weekly_ml_cluster
          # existing_cluster_id: "0319-174645-eah19iqa"
          libraries:
            - whl: /Volumes/ds_dev_db/dev_christian_van_bellen/wheels/health_pressure_risk-0.1.0-py3-none-any.whl
            - pypi:
                package: "databricks-labs-dqx>=0.13.0,<0.14.0"
            - pypi:
                package: evidently>=0.7.0
          timeout_seconds: 1800

        - task_key: performance_monitor
          description: "Calcula Precision@K realizada e detecta degradação"
          depends_on:
            - task_key: batch_score
          spark_python_task:
            python_file: ../src/monitoring/performance_monitor.py
            parameters:
              - "--catalog"
              - ${var.catalog}
              - "--schema"
              - ${var.schema}
              - "--table_gold_features"
              - ${var.table_gold_features}
              - "--table_gold_scoring"
              - ${var.table_gold_scoring}
              - "--table_gold_monitor"
              - ${var.table_gold_monitor}
              - "--mlflow_experiment"
              - ${var.mlflow_experiment}
              - "--model_name"
              - ${var.model_name}
              - "--precision_k_threshold"
              - ${var.precision_k_threshold}
          job_cluster_key: weekly_ml_cluster
          # existing_cluster_id: "0319-174645-eah19iqa"
          libraries:
            - whl: /Volumes/ds_dev_db/dev_christian_van_bellen/wheels/health_pressure_risk-0.1.0-py3-none-any.whl
            - pypi:
                package: "databricks-labs-dqx>=0.13.0,<0.14.0"
            - pypi:
                package: evidently>=0.7.0
          timeout_seconds: 3600

        - task_key: feature_drift_monitor
          description: "Detecta drift nas distribuições das features vs referência de treino"
          depends_on:
            - task_key: performance_monitor
          spark_python_task:
            python_file: ../src/monitoring/feature_drift_monitor.py
            parameters:
              - "--catalog"
              - ${var.catalog}
              - "--schema"
              - ${var.schema}
              - "--table_gold_features"
              - ${var.table_gold_features}
              - "--table_gold_scoring"
              - ${var.table_gold_scoring}
              - "--mlflow_experiment"
              - ${var.mlflow_experiment}
              - "--train_end"
              - ${var.train_end}
              - "--drift_seasonal_features"
              - ${var.drift_seasonal_features}
          job_cluster_key: weekly_ml_cluster
          # existing_cluster_id: "0319-174645-eah19iqa"
          libraries:
            - whl: /Volumes/ds_dev_db/dev_christian_van_bellen/wheels/health_pressure_risk-0.1.0-py3-none-any.whl
            - pypi:
                package: "databricks-labs-dqx>=0.13.0,<0.14.0"
            - pypi:
                package: evidently>=0.7.0
          timeout_seconds: 1800

        - task_key: retrain_trigger
          description: >
            Avalia se retraining deve ser disparado.
            Regra: Precision@K < 0.55 por 2+ competências consecutivas.
          depends_on:
            - task_key: feature_drift_monitor
          spark_python_task:
            python_file: ../src/monitoring/retrain_trigger.py
            parameters:
              - "--catalog"
              - ${var.catalog}
              - "--schema"
              - ${var.schema}
              - "--table_gold_monitor"
              - ${var.table_gold_monitor}
              - "--mlflow_experiment"
              - ${var.mlflow_experiment}
              - "--precision_k_threshold"
              - ${var.precision_k_threshold}
              - "--min_consecutive_below"
              - ${var.min_consecutive_below}
              - "--retrain_job_name"
              - ${var.retrain_job_name}
          job_cluster_key: weekly_ml_cluster
          # existing_cluster_id: "0319-174645-eah19iqa"
          libraries:
            - whl: /Volumes/ds_dev_db/dev_christian_van_bellen/wheels/health_pressure_risk-0.1.0-py3-none-any.whl
            - pypi:
                package: "databricks-labs-dqx>=0.13.0,<0.14.0"
            - pypi:
                package: evidently>=0.7.0
          timeout_seconds: 600

    # ── Job 2: Retraining ────────────────────────────────
    job_health_pressure_retrain:
      name: job_health_pressure_retrain
      description: >
        Pipeline de retraining do Radar de Pressão Assistencial.
        Disparado automaticamente pelo retrain_trigger ou manualmente.
        Treina LR + LightGBM, compara com champion atual e registra
        challenger no MLflow para aprovação humana.

      job_clusters:
        - job_cluster_key: retrain_ml_cluster
          new_cluster:
            spark_version: "16.4.x-cpu-ml-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: 1
            policy_id: "00069DFD463E0DBC"
            data_security_mode: SINGLE_USER
            aws_attributes:
              first_on_demand: 1
              availability: SPOT_WITH_FALLBACK
            spark_conf:
              spark.databricks.delta.preview.enabled: "true"
            custom_tags:
              project: "health-pressure-risk"
              job: "retrain"

      # sem schedule — disparado por trigger ou manualmente
      email_notifications:
        on_start:
          - christian.bellen@indicium.tech
        on_success:
          - christian.bellen@indicium.tech
        on_failure:
          - christian.bellen@indicium.tech

      # parâmetros recebidos do retrain_trigger
      parameters:
        - name: trigger_reason
          default: "manual"
        - name: trigger_date
          default: ""
        - name: retrain_id
          default: ""

      tasks:

        - task_key: train_baseline_lr
          description: "Treina Logistic Regression baseline"
          spark_python_task:
            python_file: ../src/training/train_baseline_lr.py
            parameters:
              - "--catalog"
              - ${var.catalog}
              - "--schema"
              - ${var.schema}
              - "--table_gold_features"
              - ${var.table_gold_features}
              - "--mlflow_experiment"
              - ${var.mlflow_experiment}
              - "--model_name"
              - ${var.model_name}
              - "--train_end"
              - ${var.train_end}
              - "--val_end"
              - ${var.val_end}
              - "--test_start"
              - ${var.test_start}
          job_cluster_key: retrain_ml_cluster
          # existing_cluster_id: "0319-174645-eah19iqa"
          libraries:
            - whl: /Volumes/ds_dev_db/dev_christian_van_bellen/wheels/health_pressure_risk-0.1.0-py3-none-any.whl
            - pypi:
                package: "databricks-labs-dqx>=0.13.0,<0.14.0"
            - pypi:
                package: evidently>=0.7.0
          timeout_seconds: 3600
          max_retries: 1

        - task_key: train_gbt
          description: "Treina LightGBM principal"
          depends_on:
            - task_key: train_baseline_lr
          spark_python_task:
            python_file: ../src/training/train_gbt.py
            parameters:
              - "--catalog"
              - ${var.catalog}
              - "--schema"
              - ${var.schema}
              - "--table_gold_features"
              - ${var.table_gold_features}
              - "--mlflow_experiment"
              - ${var.mlflow_experiment}
              - "--model_name"
              - ${var.model_name}
              - "--train_end"
              - ${var.train_end}
              - "--val_end"
              - ${var.val_end}
              - "--test_start"
              - ${var.test_start}
              - "--lgbm_params_json"
              - ${var.lgbm_params_json}
              - "--num_boost_round"
              - ${var.num_boost_round}
              - "--early_stopping"
              - ${var.early_stopping}
          job_cluster_key: retrain_ml_cluster
          # existing_cluster_id: "0319-174645-eah19iqa"
          libraries:
            - whl: /Volumes/ds_dev_db/dev_christian_van_bellen/wheels/health_pressure_risk-0.1.0-py3-none-any.whl
            - pypi:
                package: "databricks-labs-dqx>=0.13.0,<0.14.0"
            - pypi:
                package: evidently>=0.7.0
          timeout_seconds: 3600
          max_retries: 1

        - task_key: evaluate
          description: >
            Compara LR vs LightGBM, registra melhor como @challenger
            e aciona human gate no MLflow UI para promoção a @champion.
          depends_on:
            - task_key: train_gbt
          spark_python_task:
            python_file: ../src/training/evaluate.py
            parameters:
              - "--catalog"
              - ${var.catalog}
              - "--schema"
              - ${var.schema}
              - "--table_gold_features"
              - ${var.table_gold_features}
              - "--mlflow_experiment"
              - ${var.mlflow_experiment}
              - "--model_name"
              - ${var.model_name}
              - "--train_end"
              - ${var.train_end}
              - "--val_end"
              - ${var.val_end}
              - "--test_start"
              - ${var.test_start}
          job_cluster_key: retrain_ml_cluster
          # existing_cluster_id: "0319-174645-eah19iqa"
          libraries:
            - whl: /Volumes/ds_dev_db/dev_christian_van_bellen/wheels/health_pressure_risk-0.1.0-py3-none-any.whl
            - pypi:
                package: "databricks-labs-dqx>=0.13.0,<0.14.0"
            - pypi:
                package: evidently>=0.7.0
          timeout_seconds: 3600
