resources:
  jobs:

    # ── Job 1: Pipeline semanal ──────────────────────────
    job_health_pressure_weekly:
      name: job_health_pressure_weekly
      description: >
        Pipeline semanal do Radar de Pressão Assistencial.
        Roda toda segunda-feira: ingestão, transforms, scoring e monitoramento.

      job_clusters:
        - job_cluster_key: weekly_ml_cluster
          new_cluster:
            spark_version: "16.4.x-cpu-ml-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: 1
            policy_id: "00069DFD463E0DBC"
            data_security_mode: SINGLE_USER
            aws_attributes:
              first_on_demand: 1
              availability: SPOT_WITH_FALLBACK
            spark_conf:
              spark.databricks.delta.preview.enabled: "true"
              health.pressure.catalog: ${var.catalog}
              health.pressure.schema: ${var.schema}
              health.pressure.table_bronze_srag: ${var.table_bronze_srag}
              health.pressure.table_bronze_hospitais_leitos: ${var.table_bronze_hospitais_leitos}
              health.pressure.table_bronze_cnes: ${var.table_bronze_cnes}
              health.pressure.table_silver_srag: ${var.table_silver_srag}
              health.pressure.table_silver_capacity: ${var.table_silver_capacity}
              health.pressure.table_gold_features: ${var.table_gold_features}
              health.pressure.table_gold_scoring: ${var.table_gold_scoring}
              health.pressure.table_gold_monitor: ${var.table_gold_monitor}
              health.pressure.landing_path: ${var.landing_path}
              health.pressure.mlflow_experiment: ${var.mlflow_experiment}
              health.pressure.model_name: ${var.model_name}
              health.pressure.retrain_job_name: ${var.retrain_job_name}
              health.pressure.train_end: ${var.train_end}
              health.pressure.val_end: ${var.val_end}
              health.pressure.test_start: ${var.test_start}
              health.pressure.target_percentile: ${var.target_percentile}
              health.pressure.precision_k_threshold: ${var.precision_k_threshold}
              health.pressure.min_consecutive_below: ${var.min_consecutive_below}
              health.pressure.scoring_min_quality: ${var.scoring_min_quality}
              health.pressure.ab_challenger_pct: ${var.ab_challenger_pct}
              health.pressure.drift_seasonal_features: ${var.drift_seasonal_features}
              health.pressure.lgbm_params_json: ${var.lgbm_params_json}
              health.pressure.num_boost_round: ${var.num_boost_round}
              health.pressure.early_stopping: ${var.early_stopping}
            custom_tags:
              project: "health-pressure-risk"
              job: "weekly"

      schedule:
        quartz_cron_expression: "0 0 6 ? * MON"
        timezone_id: "America/Sao_Paulo"
        pause_status: PAUSED   # ativar em produção

      email_notifications:
        on_failure:
          - christian.bellen@indicium.tech

      tasks:

        - task_key: ingestao_bronze
          description: "Reingestão das fontes live (SRAG + Hospitais e Leitos)"
          spark_python_task:
            python_file: ../src/ingestion/srag_ingest.py
            parameters: ["--live"]
          job_cluster_key: weekly_ml_cluster
          # existing_cluster_id: "0319-174645-eah19iqa"
          libraries:
            - whl: /Volumes/ds_dev_db/dev_christian_van_bellen/wheels/health_pressure_risk-0.1.0-py3-none-any.whl
            - pypi:
                package: databricks-labs-dqx>=0.5.0
            - pypi:
                package: evidently>=0.7.0
          timeout_seconds: 3600
          max_retries: 1

        - task_key: ingestao_hospitais
          description: "Reingestão de Hospitais e Leitos (live)"
          depends_on:
            - task_key: ingestao_bronze
          spark_python_task:
            python_file: ../src/ingestion/hospitais_leitos_ingest.py
            parameters: ["--live"]
          job_cluster_key: weekly_ml_cluster
          # existing_cluster_id: "0319-174645-eah19iqa"
          libraries:
            - whl: /Volumes/ds_dev_db/dev_christian_van_bellen/wheels/health_pressure_risk-0.1.0-py3-none-any.whl
            - pypi:
                package: databricks-labs-dqx>=0.5.0
            - pypi:
                package: evidently>=0.7.0
          timeout_seconds: 1800
          max_retries: 1

        - task_key: silver_capacity
          description: "Reprocessa silver_capacity_municipio_mes"
          depends_on:
            - task_key: ingestao_hospitais
          spark_python_task:
            python_file: ../src/transforms/silver_capacity_municipio_mes.py
          job_cluster_key: weekly_ml_cluster
          # existing_cluster_id: "0319-174645-eah19iqa"
          libraries:
            - whl: /Volumes/ds_dev_db/dev_christian_van_bellen/wheels/health_pressure_risk-0.1.0-py3-none-any.whl
            - pypi:
                package: databricks-labs-dqx>=0.5.0
            - pypi:
                package: evidently>=0.7.0
          timeout_seconds: 1800

        - task_key: silver_srag
          description: "Reprocessa silver_srag_municipio_semana"
          depends_on:
            - task_key: ingestao_bronze
          spark_python_task:
            python_file: ../src/transforms/silver_srag_municipio_semana.py
          job_cluster_key: weekly_ml_cluster
          # existing_cluster_id: "0319-174645-eah19iqa"
          libraries:
            - whl: /Volumes/ds_dev_db/dev_christian_van_bellen/wheels/health_pressure_risk-0.1.0-py3-none-any.whl
            - pypi:
                package: databricks-labs-dqx>=0.5.0
            - pypi:
                package: evidently>=0.7.0
          timeout_seconds: 1800

        - task_key: gold_features
          description: "Reprocessa gold_pressure_features (Feature Store)"
          depends_on:
            - task_key: silver_capacity
            - task_key: silver_srag
          spark_python_task:
            python_file: ../src/transforms/gold_pressure_features.py
          job_cluster_key: weekly_ml_cluster
          # existing_cluster_id: "0319-174645-eah19iqa"
          libraries:
            - whl: /Volumes/ds_dev_db/dev_christian_van_bellen/wheels/health_pressure_risk-0.1.0-py3-none-any.whl
            - pypi:
                package: databricks-labs-dqx>=0.5.0
            - pypi:
                package: evidently>=0.7.0
          timeout_seconds: 3600

        - task_key: batch_score
          description: "Aplica @champion sobre a competência mais recente elegível"
          depends_on:
            - task_key: gold_features
          spark_python_task:
            python_file: ../src/scoring/batch_score.py
          job_cluster_key: weekly_ml_cluster
          # existing_cluster_id: "0319-174645-eah19iqa"
          libraries:
            - whl: /Volumes/ds_dev_db/dev_christian_van_bellen/wheels/health_pressure_risk-0.1.0-py3-none-any.whl
            - pypi:
                package: databricks-labs-dqx>=0.5.0
            - pypi:
                package: evidently>=0.7.0
          timeout_seconds: 1800

        - task_key: performance_monitor
          description: "Calcula Precision@K realizada e detecta degradação"
          depends_on:
            - task_key: batch_score
          spark_python_task:
            python_file: ../src/monitoring/performance_monitor.py
          job_cluster_key: weekly_ml_cluster
          # existing_cluster_id: "0319-174645-eah19iqa"
          libraries:
            - whl: /Volumes/ds_dev_db/dev_christian_van_bellen/wheels/health_pressure_risk-0.1.0-py3-none-any.whl
            - pypi:
                package: databricks-labs-dqx>=0.5.0
            - pypi:
                package: evidently>=0.7.0
          timeout_seconds: 3600

        - task_key: feature_drift_monitor
          description: "Detecta drift nas distribuições das features vs referência de treino"
          depends_on:
            - task_key: performance_monitor
          spark_python_task:
            python_file: ../src/monitoring/feature_drift_monitor.py
          job_cluster_key: weekly_ml_cluster
          # existing_cluster_id: "0319-174645-eah19iqa"
          libraries:
            - whl: /Volumes/ds_dev_db/dev_christian_van_bellen/wheels/health_pressure_risk-0.1.0-py3-none-any.whl
            - pypi:
                package: databricks-labs-dqx>=0.5.0
            - pypi:
                package: evidently>=0.7.0
          timeout_seconds: 1800

        - task_key: retrain_trigger
          description: >
            Avalia se retraining deve ser disparado.
            Regra: Precision@K < 0.55 por 2+ competências consecutivas.
          depends_on:
            - task_key: feature_drift_monitor
          spark_python_task:
            python_file: ../src/monitoring/retrain_trigger.py
          job_cluster_key: weekly_ml_cluster
          # existing_cluster_id: "0319-174645-eah19iqa"
          libraries:
            - whl: /Volumes/ds_dev_db/dev_christian_van_bellen/wheels/health_pressure_risk-0.1.0-py3-none-any.whl
            - pypi:
                package: databricks-labs-dqx>=0.5.0
            - pypi:
                package: evidently>=0.7.0
          timeout_seconds: 600

    # ── Job 2: Retraining ────────────────────────────────
    job_health_pressure_retrain:
      name: job_health_pressure_retrain
      description: >
        Pipeline de retraining do Radar de Pressão Assistencial.
        Disparado automaticamente pelo retrain_trigger ou manualmente.
        Treina LR + LightGBM, compara com champion atual e registra
        challenger no MLflow para aprovação humana.

      job_clusters:
        - job_cluster_key: retrain_ml_cluster
          new_cluster:
            spark_version: "16.4.x-cpu-ml-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: 1
            policy_id: "00069DFD463E0DBC"
            data_security_mode: SINGLE_USER
            aws_attributes:
              first_on_demand: 1
              availability: SPOT_WITH_FALLBACK
            spark_conf:
              spark.databricks.delta.preview.enabled: "true"
              health.pressure.catalog: ${var.catalog}
              health.pressure.schema: ${var.schema}
              health.pressure.table_bronze_srag: ${var.table_bronze_srag}
              health.pressure.table_bronze_hospitais_leitos: ${var.table_bronze_hospitais_leitos}
              health.pressure.table_bronze_cnes: ${var.table_bronze_cnes}
              health.pressure.table_silver_srag: ${var.table_silver_srag}
              health.pressure.table_silver_capacity: ${var.table_silver_capacity}
              health.pressure.table_gold_features: ${var.table_gold_features}
              health.pressure.table_gold_scoring: ${var.table_gold_scoring}
              health.pressure.table_gold_monitor: ${var.table_gold_monitor}
              health.pressure.landing_path: ${var.landing_path}
              health.pressure.mlflow_experiment: ${var.mlflow_experiment}
              health.pressure.model_name: ${var.model_name}
              health.pressure.retrain_job_name: ${var.retrain_job_name}
              health.pressure.train_end: ${var.train_end}
              health.pressure.val_end: ${var.val_end}
              health.pressure.test_start: ${var.test_start}
              health.pressure.target_percentile: ${var.target_percentile}
              health.pressure.precision_k_threshold: ${var.precision_k_threshold}
              health.pressure.min_consecutive_below: ${var.min_consecutive_below}
              health.pressure.scoring_min_quality: ${var.scoring_min_quality}
              health.pressure.ab_challenger_pct: ${var.ab_challenger_pct}
              health.pressure.drift_seasonal_features: ${var.drift_seasonal_features}
              health.pressure.lgbm_params_json: ${var.lgbm_params_json}
              health.pressure.num_boost_round: ${var.num_boost_round}
              health.pressure.early_stopping: ${var.early_stopping}
            custom_tags:
              project: "health-pressure-risk"
              job: "retrain"

      # sem schedule — disparado por trigger ou manualmente
      email_notifications:
        on_start:
          - christian.bellen@indicium.tech
        on_success:
          - christian.bellen@indicium.tech
        on_failure:
          - christian.bellen@indicium.tech

      # parâmetros recebidos do retrain_trigger
      parameters:
        - name: trigger_reason
          default: "manual"
        - name: trigger_date
          default: ""
        - name: retrain_id
          default: ""

      tasks:

        - task_key: train_baseline_lr
          description: "Treina Logistic Regression baseline"
          spark_python_task:
            python_file: ../src/training/train_baseline_lr.py
          job_cluster_key: retrain_ml_cluster
          # existing_cluster_id: "0319-174645-eah19iqa"
          libraries:
            - whl: /Volumes/ds_dev_db/dev_christian_van_bellen/wheels/health_pressure_risk-0.1.0-py3-none-any.whl
            - pypi:
                package: databricks-labs-dqx>=0.5.0
            - pypi:
                package: evidently>=0.7.0
          timeout_seconds: 3600
          max_retries: 1

        - task_key: train_gbt
          description: "Treina LightGBM principal"
          depends_on:
            - task_key: train_baseline_lr
          spark_python_task:
            python_file: ../src/training/train_gbt.py
          job_cluster_key: retrain_ml_cluster
          # existing_cluster_id: "0319-174645-eah19iqa"
          libraries:
            - whl: /Volumes/ds_dev_db/dev_christian_van_bellen/wheels/health_pressure_risk-0.1.0-py3-none-any.whl
            - pypi:
                package: databricks-labs-dqx>=0.5.0
            - pypi:
                package: evidently>=0.7.0
          timeout_seconds: 3600
          max_retries: 1

        - task_key: evaluate
          description: >
            Compara LR vs LightGBM, registra melhor como @challenger
            e aciona human gate no MLflow UI para promoção a @champion.
          depends_on:
            - task_key: train_gbt
          spark_python_task:
            python_file: ../src/training/evaluate.py
          job_cluster_key: retrain_ml_cluster
          # existing_cluster_id: "0319-174645-eah19iqa"
          libraries:
            - whl: /Volumes/ds_dev_db/dev_christian_van_bellen/wheels/health_pressure_risk-0.1.0-py3-none-any.whl
            - pypi:
                package: databricks-labs-dqx>=0.5.0
            - pypi:
                package: evidently>=0.7.0
          timeout_seconds: 3600
