name: CI/CD — Health Pressure Risk

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

env:
  PYTHON_VERSION: "3.11"
  UV_VERSION: "0.9.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:

  # ── Job 1: Lint e testes ─────────────────────────────
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras --frozen
        # --frozen: usa exatamente o uv.lock, falha se divergir

      - name: Lint — ruff check
        run: uv run ruff check src/ --output-format=github

      - name: Lint — ruff format check
        run: uv run ruff format src/ --check

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short
        env:
          PYTHONPATH: src

  # ── Job 2: Build wheel + publish ao Volume (dev) ─────
  build-wheel:
    name: Build and Publish Wheel
    runs-on: ubuntu-latest
    needs: lint-and-test
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Build wheel
        run: uv build --wheel

      - name: Install Databricks CLI
        uses: databricks/setup-cli@v0.295.0

      - name: Configure Databricks auth
        run: |
          echo "DATABRICKS_HOST=${{ secrets.DATABRICKS_HOST }}" >> $GITHUB_ENV
          echo "DATABRICKS_CLIENT_ID=${{ vars.DATABRICKS_CLIENT_ID }}" >> $GITHUB_ENV
          echo "DATABRICKS_CLIENT_SECRET=${{ secrets.DATABRICKS_CLIENT_SECRET }}" >> $GITHUB_ENV

      - name: Upload wheel to Unity Catalog Volume
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          DATABRICKS_AUTH_TYPE: oauth-m2m
        run: |
          echo "CLIENT_ID len: ${#DATABRICKS_CLIENT_ID}"
          echo "SECRET len: ${#DATABRICKS_CLIENT_SECRET}"
          WHL=$(ls dist/health_pressure_risk-*.whl | head -1)
          WHL_NAME=$(basename "$WHL")
          echo "Uploading $WHL_NAME..."
          cd /tmp
          databricks fs cp \
            "$GITHUB_WORKSPACE/$WHL" \
            "dbfs:/Volumes/ds_dev_db/dev_christian_van_bellen/wheels/$WHL_NAME" \
            --overwrite
          echo "Upload concluído"

  # ── Job 4: Validate bundle (todos os pushes) ─────────
  dab-validate:
    name: Validate Bundle
    runs-on: ubuntu-latest
    needs: [lint-and-test, build-wheel]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Install Databricks CLI
        uses: databricks/setup-cli@v0.295.0

      - name: Configure Databricks auth
        run: |
          echo "DATABRICKS_HOST=${{ secrets.DATABRICKS_HOST }}" >> $GITHUB_ENV
          echo "DATABRICKS_CLIENT_ID=${{ vars.DATABRICKS_CLIENT_ID }}" >> $GITHUB_ENV
          echo "DATABRICKS_CLIENT_SECRET=${{ secrets.DATABRICKS_CLIENT_SECRET }}" >> $GITHUB_ENV
          echo "DATABRICKS_AUTH_TYPE=oauth-m2m" >> $GITHUB_ENV

      - name: Validate bundle (dev)
        run: databricks bundle validate --target dev

      - name: Validate bundle (prod)
        run: databricks bundle validate --target prod

  # ── Job 5: Deploy dev (PRs) ───────────────────────────
  dab-deploy-dev:
    name: Deploy Bundle (dev)
    runs-on: ubuntu-latest
    needs: dab-validate
    if: github.event_name == 'pull_request'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Install Databricks CLI
        uses: databricks/setup-cli@v0.295.0

      - name: Configure Databricks auth
        run: |
          echo "DATABRICKS_HOST=${{ secrets.DATABRICKS_HOST }}" >> $GITHUB_ENV
          echo "DATABRICKS_CLIENT_ID=${{ vars.DATABRICKS_CLIENT_ID }}" >> $GITHUB_ENV
          echo "DATABRICKS_CLIENT_SECRET=${{ secrets.DATABRICKS_CLIENT_SECRET }}" >> $GITHUB_ENV
          echo "DATABRICKS_AUTH_TYPE=oauth-m2m" >> $GITHUB_ENV

      - name: Deploy bundle (dev)
        run: databricks bundle deploy --target dev

  # ── Job 6: Deploy prod (merge em main) ───────────────
  dab-deploy-prod:
    name: Deploy Bundle (prod)
    runs-on: ubuntu-latest
    needs: dab-validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    environment: production
    # 'environment: production' ativa o manual approval gate
    # do GitHub Environments antes do deploy em prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Install Databricks CLI
        uses: databricks/setup-cli@v0.295.0

      - name: Configure Databricks auth
        run: |
          echo "DATABRICKS_HOST=${{ secrets.DATABRICKS_HOST }}" >> $GITHUB_ENV
          echo "DATABRICKS_CLIENT_ID=${{ vars.DATABRICKS_CLIENT_ID }}" >> $GITHUB_ENV
          echo "DATABRICKS_CLIENT_SECRET=${{ secrets.DATABRICKS_CLIENT_SECRET }}" >> $GITHUB_ENV
          echo "DATABRICKS_AUTH_TYPE=oauth-m2m" >> $GITHUB_ENV

      - name: Deploy bundle (prod)
        run: databricks bundle deploy --target prod
