name: CI/CD — Health Pressure Risk

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

env:
  PYTHON_VERSION: "3.11"
  UV_VERSION: "0.9.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:

  # ── Job 1: Lint e testes ─────────────────────────────
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras --frozen
        # --frozen: usa exatamente o uv.lock, falha se divergir

      - name: Lint — ruff check
        run: uv run ruff check src/ --output-format=github

      - name: Lint — ruff format check
        run: uv run ruff format src/ --check

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short
        env:
          PYTHONPATH: src

  # ── Job 2: Validate bundle (todos os pushes) ─────────
  dab-validate:
    name: Validate Bundle
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          databricks --version

      - name: Configure Databricks auth
        run: |
          echo "DATABRICKS_HOST=${{ secrets.DATABRICKS_HOST }}" >> $GITHUB_ENV
          echo "DATABRICKS_CLIENT_ID=${{ secrets.DATABRICKS_CLIENT_ID }}" >> $GITHUB_ENV
          echo "DATABRICKS_CLIENT_SECRET=${{ secrets.DATABRICKS_CLIENT_SECRET }}" >> $GITHUB_ENV
          echo "DATABRICKS_AUTH_TYPE=oauth-m2m" >> $GITHUB_ENV

      - name: Validate bundle (dev)
        run: databricks bundle validate --target dev

      - name: Validate bundle (prod)
        run: databricks bundle validate --target prod

  # ── Job 3: Deploy dev (PRs) ───────────────────────────
  dab-deploy-dev:
    name: Deploy Bundle (dev)
    runs-on: ubuntu-latest
    needs: dab-validate
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          databricks --version

      - name: Configure Databricks auth
        run: |
          echo "DATABRICKS_HOST=${{ secrets.DATABRICKS_HOST }}" >> $GITHUB_ENV
          echo "DATABRICKS_CLIENT_ID=${{ secrets.DATABRICKS_CLIENT_ID }}" >> $GITHUB_ENV
          echo "DATABRICKS_CLIENT_SECRET=${{ secrets.DATABRICKS_CLIENT_SECRET }}" >> $GITHUB_ENV
          echo "DATABRICKS_AUTH_TYPE=oauth-m2m" >> $GITHUB_ENV

      - name: Deploy bundle (dev)
        run: databricks bundle deploy --target dev

  # ── Job 4: Deploy prod (merge em main) ───────────────
  dab-deploy-prod:
    name: Deploy Bundle (prod)
    runs-on: ubuntu-latest
    needs: dab-validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment: production
    # 'environment: production' ativa o manual approval gate
    # do GitHub Environments antes do deploy em prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          databricks --version

      - name: Configure Databricks auth
        run: |
          echo "DATABRICKS_HOST=${{ secrets.DATABRICKS_HOST }}" >> $GITHUB_ENV
          echo "DATABRICKS_CLIENT_ID=${{ secrets.DATABRICKS_CLIENT_ID }}" >> $GITHUB_ENV
          echo "DATABRICKS_CLIENT_SECRET=${{ secrets.DATABRICKS_CLIENT_SECRET }}" >> $GITHUB_ENV
          echo "DATABRICKS_AUTH_TYPE=oauth-m2m" >> $GITHUB_ENV

      - name: Deploy bundle (prod)
        run: databricks bundle deploy --target prod
