name: CI — Health Pressure Risk

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

env:
  PYTHON_VERSION: "3.11"
  UV_VERSION: "0.9.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:

  # ── Job 1: Lint e testes ──────────────────────────────
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Lint — ruff check
        run: uv run ruff check src/ --output-format=github

      - name: Lint — ruff format check
        run: uv run ruff format src/ --check

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short
        env:
          PYTHONPATH: src

  # ── Job 2: Build wheel + upload dev ───────────────────
  build-wheel:
    name: Build and Publish Wheel (dev)
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Build wheel
        run: uv build --wheel

      - name: Install Databricks CLI
        uses: databricks/setup-cli@v0.295.0

      - name: Configure Databricks auth
        run: |
          echo "DATABRICKS_HOST=${{ vars.DATABRICKS_HOST }}" >> $GITHUB_ENV
          echo "DATABRICKS_CLIENT_ID=${{ vars.DATABRICKS_CLIENT_ID }}" >> $GITHUB_ENV
          echo "DATABRICKS_CLIENT_SECRET=${{ secrets.DATABRICKS_CLIENT_SECRET }}" >> $GITHUB_ENV

      - name: Upload wheel to dev Volume
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
          DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          DATABRICKS_AUTH_TYPE: oauth-m2m
        run: |
          WHL=$(ls dist/health_pressure_risk-*.whl | head -1)
          WHL_NAME=$(basename "$WHL")
          echo "Uploading $WHL_NAME → dev..."
          cd /tmp
          databricks fs cp \
            "$GITHUB_WORKSPACE/$WHL" \
            "dbfs:/Volumes/ds_dev_db/dev_christian_van_bellen/wheels/$WHL_NAME" \
            --overwrite
          echo "Upload dev concluído"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/*.whl
          retention-days: 1

  # ── Job 3: Validate bundle dev (sempre) ──────────────
  dab-validate-dev:
    name: Validate Bundle (dev)
    runs-on: ubuntu-latest
    needs: [lint-and-test, build-wheel]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@v0.295.0

      - name: Validate bundle (dev)
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
          DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          DATABRICKS_AUTH_TYPE: oauth-m2m
        run: databricks bundle validate --target dev

  # ── Jobs exclusivos de PR ─────────────────────────────

  upload-wheel-qa:
    name: Upload Wheel (qa)
    runs-on: ubuntu-latest
    needs: build-wheel
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: wheel
          path: dist/

      - name: Install Databricks CLI
        uses: databricks/setup-cli@v0.295.0

      - name: Configure Databricks auth
        run: |
          echo "DATABRICKS_HOST=${{ vars.DATABRICKS_HOST }}" >> $GITHUB_ENV
          echo "DATABRICKS_CLIENT_ID=${{ vars.DATABRICKS_CLIENT_ID }}" >> $GITHUB_ENV
          echo "DATABRICKS_CLIENT_SECRET=${{ secrets.DATABRICKS_CLIENT_SECRET }}" >> $GITHUB_ENV

      - name: Upload wheel to qa Volume
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
          DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          DATABRICKS_AUTH_TYPE: oauth-m2m
        run: |
          WHL=$(ls dist/health_pressure_risk-*.whl | head -1)
          WHL_NAME=$(basename "$WHL")
          echo "Uploading $WHL_NAME → qa..."
          cd /tmp
          databricks fs cp \
            "$GITHUB_WORKSPACE/$WHL" \
            "dbfs:/Volumes/ds_qa_db/mlops_demo_health_pressure_risk/wheels/$WHL_NAME" \
            --overwrite
          echo "Upload qa concluído"

  dab-validate-qa:
    name: Validate Bundle (qa)
    runs-on: ubuntu-latest
    needs: [lint-and-test, build-wheel]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@v0.295.0

      - name: Validate bundle (qa)
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
          DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          DATABRICKS_AUTH_TYPE: oauth-m2m
        run: databricks bundle validate --target qa

  dab-deploy-dev:
    name: Deploy Bundle (dev)
    runs-on: ubuntu-latest
    needs: [build-wheel, dab-validate-dev]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@v0.295.0

      - name: Deploy bundle (dev)
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
          DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          DATABRICKS_AUTH_TYPE: oauth-m2m
        run: databricks bundle deploy --target dev

  dab-deploy-qa:
    name: Deploy Bundle (qa)
    runs-on: ubuntu-latest
    needs: [upload-wheel-qa, dab-validate-qa, dab-deploy-dev]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@v0.295.0

      - name: Deploy bundle (qa)
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
          DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          DATABRICKS_AUTH_TYPE: oauth-m2m
        run: databricks bundle deploy --target qa
