bundle:
  name: mlops-demo-health-pressure-risk

variables:
  catalog:
    default: ds_dev_db
  schema:
    default: dev_christian_van_bellen

  # tabelas bronze
  table_bronze_srag:
    default: ${var.catalog}.${var.schema}.bronze_srag
  table_bronze_hospitais_leitos:
    default: ${var.catalog}.${var.schema}.bronze_hospitais_leitos
  table_bronze_cnes:
    default: ${var.catalog}.${var.schema}.bronze_cnes_estabelecimentos

  # tabelas silver
  table_silver_srag:
    default: ${var.catalog}.${var.schema}.silver_srag_municipio_semana
  table_silver_capacity:
    default: ${var.catalog}.${var.schema}.silver_capacity_municipio_mes

  # tabelas gold
  table_gold_features:
    default: ${var.catalog}.${var.schema}.gold_pressure_features
  table_gold_scoring:
    default: ${var.catalog}.${var.schema}.gold_pressure_scoring
  table_gold_monitor:
    default: ${var.catalog}.${var.schema}.monitoring_performance

  # volumes e mlflow
  landing_path:
    default: /Volumes/${var.catalog}/${var.schema}/landing
  wheels_volume:
    default: /Volumes/${var.catalog}/${var.schema}/wheels
  mlflow_experiment:
    default: "/Shared/mlops_workshop/health-pressure-risk/pressure-risk-baseline-lr"

  # model registry
  model_name:
    default: ${var.catalog}.${var.schema}.pressure_risk_classifier
  retrain_job_name:
    default: job_health_pressure_retrain

  # split temporal
  train_end:
    default: "202412"
  val_end:
    default: "202506"
  test_start:
    default: "202507"

  # thresholds operacionais
  target_percentile:
    default: "0.85"
  precision_k_threshold:
    default: "0.55"
  min_consecutive_below:
    default: "2"
  scoring_min_quality:
    default: "0.5"
  ab_challenger_pct:
    default: "0.20"
  drift_seasonal_features:
    default: "mes,quarter,is_semester1,is_rainy_season"

  # lgbm
  lgbm_params_json:
    default: '{"objective":"binary","metric":"binary_logloss","boosting_type":"gbdt","num_leaves":63,"learning_rate":0.05,"feature_fraction":0.8,"bagging_fraction":0.8,"bagging_freq":5,"min_child_samples":20,"reg_alpha":0.1,"reg_lambda":0.1,"verbose":-1}'
  num_boost_round:
    default: "500"
  early_stopping:
    default: "50"

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-bacd151e-e2f8.cloud.databricks.com
    variables:
      catalog: ds_dev_db
      schema:  dev_christian_van_bellen

  qa:
    mode: development
    workspace:
      host: https://dbc-bacd151e-e2f8.cloud.databricks.com
    variables:
      catalog: ds_qa_db
      schema:  mlops_demo_health_pressure_risk

  prod:
    mode: production
    workspace:
      host: https://dbc-bacd151e-e2f8.cloud.databricks.com
    variables:
      catalog: ds_prod_db
      schema:  mlops_demo_health_pressure_risk

include:
  - resources/*.yml
